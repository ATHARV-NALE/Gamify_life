<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="watercolor-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="4" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="40" xChannelSelector="R" yChannelSelector="G" result="displaced" />
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="none"/>
  <!-- Warm soft spots representing organic watercolor flows -->
  <circle cx="300" cy="300" r="250" fill="#D4A853" opacity="0.06" filter="url(#watercolor-filter)" />
  <circle cx="500" cy="450" r="300" fill="#B8923A" opacity="0.04" filter="url(#watercolor-filter)" />
  <circle cx="200" cy="600" r="200" fill="#2E2924" opacity="0.08" filter="url(#watercolor-filter)" />
</svg>
